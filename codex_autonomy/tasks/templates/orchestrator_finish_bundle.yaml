tasks:
  - task_id: orchestrator-ingestion-trace-path
    title: "Orchestrator: ingestion and trace path hardening"
    task_type: feature
    priority: 10
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate the local source + trace ingestion path for orchestrator_stack.
      Keep changes narrowly scoped to ingestion reliability and data contracts.
      Add or update concise artifact/schema notes where outputs are generated.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-simulator-features
    title: "Orchestrator: simulator layer and feature extraction"
    task_type: feature
    priority: 20
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate AIOpsLab-style simulator behavior and feature extraction integration.
      Keep this PR limited to simulator/feature logic and immediate tests/fixes.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-xgboost-observation
    title: "Orchestrator: XGBoost predictor observation integration"
    task_type: feature
    priority: 30
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Integrate XGBoost safety/resource predictors into orchestrator observations.
      Ensure runtime wiring is active (no placeholders) and keep changes scoped to this integration.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-rllib-referee
    title: "Orchestrator: RLlib PPO multi-agent and referee conflict logic"
    task_type: feature
    priority: 40
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate Ray RLlib PPO multi-agent layer (Agent A/B/C) with referee conflict logic.
      Keep this PR focused on RL/referee behavior and related fixes.
      Commit and push only this slice.
    max_sessions: 8
    max_retries: 4

  - task_id: orchestrator-optuna-meta-tuning
    title: "Orchestrator: Optuna meta-optimizer tuning integration"
    task_type: feature
    priority: 50
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Integrate Optuna meta-optimizer for reward weights and RL hyperparameters.
      Validate it executes in runtime paths and is not placeholder code.
      Commit and push only this slice.
    max_sessions: 8
    max_retries: 4

  - task_id: orchestrator-scoreboard-feedback
    title: "Orchestrator: global scoreboard and feedback loop"
    task_type: feature
    priority: 60
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate the global scoreboard and full feedback loop.
      Keep PR scope to scoreboard/feedback integration and direct regressions.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-fixups-and-errors
    title: "Orchestrator: targeted bug fixes and resiliency"
    task_type: bug
    priority: 70
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - codex_autonomy/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Run validation commands, fix concrete errors/regressions, and harden fragile spots.
      Keep each change narrowly targeted to bug/risk mitigation.
      Commit and push incremental fixes in small slices.
    max_sessions: 8
    max_retries: 5

  - task_id: orchestrator-e2e-gate-runtime
    title: "Orchestrator: end-to-end gate runtime validation"
    task_type: chore
    priority: 80
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
    prompt: |
      Run the full process gate command and ensure it passes.
      Keep this PR focused on runtime validation, generated artifacts, and the smallest direct fixes needed to make the gate pass.
      Do not batch unrelated documentation cleanup into this task.
    done_when_commands:
      - "./.venv/bin/python orchestrator_stack/run.py full-process --config orchestrator_stack/config/orchestrator.example.json --trials 1"
    max_sessions: 10
    max_retries: 5

  - task_id: orchestrator-e2e-gate-doc-sync
    title: "Orchestrator: end-to-end gate documentation sync"
    task_type: chore
    priority: 81
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
      - Agents.md
    prompt: |
      Synchronize README/NEXT_STEPS/report docs with exact tested behavior and known residual risks from the latest orchestrator validation runs.
      Keep this PR documentation-only unless a tiny directly coupled doc-support file must move with it.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-e2e-gate-followups
    title: "Orchestrator: end-to-end gate follow-up issue split"
    task_type: chore
    priority: 82
    dependencies: []
    scope_paths:
      - codex_autonomy/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Open or enqueue narrowly scoped follow-up issues/tasks for anything discovered during final validation that should not stay in a catch-all PR.
      Keep this PR limited to follow-up task specs, issue links, and minimal continuity-file updates.
    max_sessions: 6
    max_retries: 4
