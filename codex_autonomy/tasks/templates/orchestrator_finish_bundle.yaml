tasks:
  - task_id: orchestrator-ingestion-trace-path
    title: "Orchestrator: ingestion and trace path hardening"
    task_type: feature
    priority: 10
    dependencies: []
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate the local source + trace ingestion path for orchestrator_stack.
      Keep changes narrowly scoped to ingestion reliability and data contracts.
      Add or update concise artifact/schema notes where outputs are generated.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-simulator-features
    title: "Orchestrator: simulator layer and feature extraction"
    task_type: feature
    priority: 20
    dependencies:
      - orchestrator-ingestion-trace-path
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate AIOpsLab-style simulator behavior and feature extraction integration.
      Keep this PR limited to simulator/feature logic and immediate tests/fixes.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-xgboost-observation
    title: "Orchestrator: XGBoost predictor observation integration"
    task_type: feature
    priority: 30
    dependencies:
      - orchestrator-simulator-features
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Integrate XGBoost safety/resource predictors into orchestrator observations.
      Ensure runtime wiring is active (no placeholders) and keep changes scoped to this integration.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-rllib-referee
    title: "Orchestrator: RLlib PPO multi-agent and referee conflict logic"
    task_type: feature
    priority: 40
    dependencies:
      - orchestrator-xgboost-observation
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate Ray RLlib PPO multi-agent layer (Agent A/B/C) with referee conflict logic.
      Keep this PR focused on RL/referee behavior and related fixes.
      Commit and push only this slice.
    max_sessions: 8
    max_retries: 4

  - task_id: orchestrator-optuna-meta-tuning
    title: "Orchestrator: Optuna meta-optimizer tuning integration"
    task_type: feature
    priority: 50
    dependencies:
      - orchestrator-rllib-referee
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Integrate Optuna meta-optimizer for reward weights and RL hyperparameters.
      Validate it executes in runtime paths and is not placeholder code.
      Commit and push only this slice.
    max_sessions: 8
    max_retries: 4

  - task_id: orchestrator-scoreboard-feedback
    title: "Orchestrator: global scoreboard and feedback loop"
    task_type: feature
    priority: 60
    dependencies:
      - orchestrator-optuna-meta-tuning
    scope_paths:
      - orchestrator_stack/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Implement and validate the global scoreboard and full feedback loop.
      Keep PR scope to scoreboard/feedback integration and direct regressions.
      Commit and push only this slice.
    max_sessions: 6
    max_retries: 4

  - task_id: orchestrator-fixups-and-errors
    title: "Orchestrator: targeted bug fixes and resiliency"
    task_type: bug
    priority: 70
    dependencies:
      - orchestrator-scoreboard-feedback
    scope_paths:
      - orchestrator_stack/
      - codex_autonomy/
      - reports/
      - README.md
      - NEXT_STEPS.md
    prompt: |
      Run validation commands, fix concrete errors/regressions, and harden fragile spots.
      Keep each change narrowly targeted to bug/risk mitigation.
      Commit and push incremental fixes in small slices.
    max_sessions: 8
    max_retries: 5

  - task_id: orchestrator-e2e-final-gate
    title: "Orchestrator: end-to-end final gate and docs sync"
    task_type: chore
    priority: 80
    dependencies:
      - orchestrator-fixups-and-errors
    scope_paths:
      - orchestrator_stack/
      - codex_autonomy/
      - reports/
      - README.md
      - NEXT_STEPS.md
      - Agents.md
    prompt: |
      Run the full process gate command and ensure it passes.
      Synchronize README/NEXT_STEPS/report docs with exact tested behavior and known residual risks.
      Open follow-up issues for anything out of scope.
      Keep this final PR focused on final validation and documentation alignment.
    done_when_commands:
      - "./.venv/bin/python orchestrator_stack/run.py full-process --config orchestrator_stack/config/orchestrator.example.json --trials 1"
    max_sessions: 10
    max_retries: 5
